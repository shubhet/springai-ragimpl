spring.application.name=rag
server.port=8090
#spring.ai.chat.client.enabled=false
#api key for open ai
spring.ai.openai.api-key=${OPENAI_API_KEY}

#custom model we are using
spring.ai.openai.chat.options.model=gpt-4.1

logging.level.org.springframework.ai.chat.client.advisor=DEBUG
#db configurations
spring.datasource.url=jdbc:mariadb://localhost:3309/springai
spring.datasource.username=root
spring.datasource.password=root1234

spring.ai.vectorstore.mariadb.initialize-schema=true
spring.ai.vectorstore.mariadb.distance-type=COSINE
spring.ai.vectorstore.mariadb.dimensions=1536
